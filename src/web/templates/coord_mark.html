{% extends "base.html" %}

{% block title %}图片框选标记 - CoordMarker{% endblock %}

{% block head %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/coord_mark.css') }}">
  <script>
    window.COORD_MARK_CONFIG = {
      initial: {
        minCanvasWidth: 320,
        hitPadding: 6,
        minSelectionSize: 3,
        defaultText: "文字"
      },
      colors: {
        rectangle: "#2563eb",
        circle: "#16a34a",
        arrow: "#7c3aed",
        text: "#0891b2",
        selected: "#f97316",
        preview: "#9333ea"
      },
      labels: {
        rectangle: "方形",
        circle: "圆形",
        arrow: "箭头",
        text: "文字"
      },
      messages: {
        imageLoadFailed: "图片加载失败。"
      },
      export: {
        filename: "图象坐标.txt",
        numberPrecision: 2
      }
    };
  </script>
  <script src="{{ url_for('static', filename='js/coord_mark.js') }}" defer></script>
{% endblock %}

{% block content %}
  <div class="tool-header">
    <h2>图片框选标记</h2>
    <a class="back-link" href="{{ url_for('menu.index') }}">返回菜单</a>
  </div>

  <div class="workspace">
    <section class="canvas-panel">
      <h3 class="panel-title">图片区域</h3>
      <div class="canvas-shell">
        <canvas id="markCanvas" hidden></canvas>
        <div id="canvasEmpty" class="empty-state">选择图片后，在图片上按下并拖动即可创建标记。</div>
      </div>
    </section>

    <aside class="controls-panel">
      <h3 class="panel-title">框选设置</h3>
      <div class="control-panel">
        <div class="message">Ctrl+左键可以多选；松开 Ctrl 后右键拖动可移动选中项；Ctrl+右键拖动会复制选中项并拖动副本；拖动边、顶点或箭头端点可调整。</div>

        <div class="field-group">
          <label for="imageInput">图片文件</label>
          <input id="imageInput" type="file" accept="image/*">
        </div>

        <div class="field-group">
          <label for="shapeSelect">框选规则</label>
          <select id="shapeSelect">
            <option value="rectangle">方形框选</option>
            <option value="circle">圆形框选</option>
            <option value="arrow">箭头标记</option>
            <option value="text">文字框选</option>
          </select>
        </div>

        <div class="field-group">
          <label for="textInput">文字内容</label>
          <input id="textInput" type="text" value="文字" placeholder="输入文字框内容">
        </div>

        <div class="readout">
          <div>图片尺寸：<strong id="imageSize">-</strong></div>
          <div>标记数量：<strong id="selectionCount">0</strong></div>
          <div>当前选中：<strong id="selectedInfo">-</strong></div>
        </div>

        <div class="actions">
          <button id="deleteButton" type="button" class="danger" disabled>删除选中</button>
          <button id="clearButton" type="button" class="secondary" disabled>清空全部</button>
          <button id="saveButton" type="button" class="secondary" disabled>保存数据</button>
        </div>

        <div class="field-group">
          <div class="field-label">已保存标记</div>
          <div id="selectionList" class="selection-list"></div>
        </div>
      </div>
    </aside>
  </div>
{% endblock %}
