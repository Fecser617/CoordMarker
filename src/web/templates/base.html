<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CoordMarker{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #667085;
        --line: #d7dce3;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      }

      .page {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      .site-header {
        margin-bottom: 28px;
      }

      .site-title {
        margin: 0;
        font-size: 32px;
        font-weight: 700;
      }

      .site-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .content {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 24px;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <main class="page">
      <header class="site-header">
        <h1 class="site-title">CoordMarker</h1>
        <p class="site-subtitle">功能菜单</p>
      </header>
      <section class="content">
        {% block content %}{% endblock %}
      </section>
    </main>
  </body>
</html>
